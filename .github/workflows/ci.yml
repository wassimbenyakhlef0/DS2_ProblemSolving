name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate static files
        run: python scripts/validate_site.py

      - name: Build Docker image
        run: docker build -t student-hub:${{ github.sha }} .

